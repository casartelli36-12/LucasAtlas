<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1B2A4A; --navy-light:#2E4170; --orange:#E87722; --orange-light:#FEF0E3;
  --bg:#FFFFFF; --surface:#F7F8FA; --border:#E2E5EA;
  --text:#1A1A2E; --text-2:#5A6373; --text-3:#9AA0AD;
  --green:#1B5E3B; --green-light:#EAF5EE; --red:#C0392B; --red-light:#FDECEA;
  --blue-chip:#1A4E8C; --blue-chip-light:#EBF3FB;
  --radius:12px; --radius-sm:8px;
  --shadow:0 2px 12px rgba(0,0,0,.08); --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--surface);color:var(--text);-webkit-tap-highlight-color:transparent;}
input,textarea,select{font-family:'Inter',sans-serif;}
button{cursor:pointer;}

/* ── LOGIN GATE ── */
.gate{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.gate.hidden{display:none;}
.gate-box{background:#fff;border-radius:var(--radius);padding:28px 24px;width:100%;max-width:320px;text-align:center;}
.gate-box svg{margin-bottom:10px;}
.gate-box h1{font-size:16px;color:var(--navy);margin-bottom:2px;}
.gate-box p{font-size:12px;color:var(--text-2);margin-bottom:16px;}
.gate-box input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;font-size:14px;outline:none;margin-bottom:10px;}
.gate-box input:focus{border-color:var(--navy);}
.gate-box button{width:100%;padding:11px;background:var(--orange);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;}
.gate-err{color:var(--red);font-size:12px;margin-top:8px;display:none;}

/* ── APP SHELL ── */
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--navy);color:#fff;position:sticky;top:0;z-index:20;}
.topbar h1{font-size:15px;font-weight:700;flex:1;}
.topbar p{font-size:10.5px;color:rgba(255,255,255,.5);}
.btn-back{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;padding:7px 10px;font-size:13px;font-weight:600;flex-shrink:0;}
.btn-lock{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;padding:7px 9px;font-size:15px;flex-shrink:0;line-height:1;}
.btn-lock.unlocked{background:var(--orange);}
.panel{padding:18px 16px 40px;flex:1;}

/* Tablet / landscape (iPad, etc.): en pantallas anchas la columna angosta de
   celular deja huecos enormes a los costados, así que reorganizamos el
   contenido para usar el espacio en vez de solo centrarlo. */
@media (min-width:680px){
  .app{max-width:none;}
  .panel{padding:24px 32px 48px;max-width:760px;margin:0 auto;width:100%;}
  .lesion-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;}
  .lesion-list.compact{grid-template-columns:1fr 1fr 1fr;}
  .zona-header{max-width:760px;margin:0 auto 14px;}
  .body-screen{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:36px;text-align:left;}
  .body-screen .body-intro{text-align:left;}
  .body-screen .body-intro p{margin:0;}
  .body-screen .body-wrap{flex-shrink:0;padding:0;}
  .body-screen .body-wrap svg{max-width:300px;}
  .body-screen .body-col-right{flex:1;min-width:0;}
  .body-screen .body-mode-toggle{justify-content:flex-start;}
  .body-screen .zonas-legend{justify-content:flex-start;margin-top:16px;}
}
@media (min-width:680px) and (orientation:portrait){
  .lesion-list{grid-template-columns:1fr;}
  .body-screen{flex-direction:column;text-align:center;gap:6px;}
  .body-screen .body-intro{text-align:center;}
  .body-screen .body-mode-toggle,.body-screen .zonas-legend{justify-content:center;}
}

/* ── VISTA CUERPO ── */
.body-intro{text-align:center;margin-bottom:6px;}
.body-intro h2{font-size:16px;color:var(--navy);margin-bottom:4px;}
.body-intro p{font-size:12.5px;color:var(--text-2);line-height:1.5;max-width:320px;margin:0 auto;}
.body-mode-toggle{display:flex;justify-content:center;gap:8px;margin:12px 0 2px;}
.body-mode-toggle button{border:1px solid var(--border);background:#fff;color:var(--text-2);font-size:12px;font-weight:600;padding:7px 14px;border-radius:20px;font-family:Inter,sans-serif;}
.body-mode-toggle button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.body-wrap{display:flex;justify-content:center;padding:10px 0 6px;}
.body-wrap svg{width:100%;max-width:280px;height:auto;}
.body-figure{fill:url(#bodyGrad);stroke:var(--navy);stroke-width:2;stroke-linejoin:round;filter:url(#bodyShadow);}
.body-limb{stroke:url(#limbGrad);stroke-linecap:round;fill:none;filter:url(#bodyShadow);}
.body-limb-line{stroke:var(--navy);fill:none;stroke-linecap:round;}
.hotspot{cursor:pointer;}
.hotspot circle.dot{transition:r .12s,fill .12s;stroke:#fff;stroke-width:2.5;}
.hotspot circle.pulse{fill:none;stroke:var(--orange);stroke-width:2;opacity:0;}
.hotspot.active circle.dot{fill:var(--orange);}
.hotspot.active circle.pulse{animation:pulseRing 2.2s ease-out infinite;}
.hotspot.active:active circle.dot{r:12;}
.hotspot.locked circle.dot{fill:#C7CCD6;}
@keyframes pulseRing{0%{r:9;opacity:.55;}100%{r:18;opacity:0;}}
.zonas-legend{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px;}
.legend-chip{font-size:10.5px;padding:5px 10px;border-radius:20px;font-weight:600;}
.legend-chip.active{background:var(--orange-light);color:var(--orange);}
.legend-chip.locked{background:var(--surface);color:var(--text-3);border:1px solid var(--border);}

/* ── VISTA ZONA ── */
.zona-header{margin-bottom:14px;}
.zona-header h2{font-size:18px;color:var(--navy);}
.zona-search{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;outline:none;margin:10px 0 10px;background:var(--surface);}
.zona-search:focus{border-color:var(--navy);background:#fff;}
.view-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:30px;padding:3px;margin-bottom:14px;}
.view-toggle button{flex:1;border:none;background:transparent;padding:8px 6px;font-size:12.5px;font-weight:600;color:var(--text-2);border-radius:24px;font-family:Inter,sans-serif;}
.view-toggle button.on{background:var(--navy);color:#fff;}
.lesion-list{display:flex;flex-direction:column;gap:10px;}
.lesion-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--bg);}
.lesion-head{display:flex;align-items:center;gap:8px;padding:14px;background:var(--surface);cursor:pointer;}
.lesion-title-block{flex:1;min-width:0;}
.lesion-title-block h3{font-size:15px;font-weight:700;color:var(--navy);line-height:1.3;}
.lesion-chevron{color:var(--text-3);font-size:12px;transition:transform .15s;flex-shrink:0;}
.lesion-card.open .lesion-chevron{transform:rotate(180deg);}
.lesion-body{display:none;padding:14px;}
.lesion-card.open .lesion-body{display:block;}
.ref-text{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:14px;}
.ref-block{margin-bottom:14px;}
.sub-section-title{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--orange);margin-bottom:8px;}
.ref-list{list-style:none;}
.ref-list li{font-size:13px;line-height:1.55;color:var(--text);padding:8px 0;border-bottom:1px solid var(--border);}
.ref-list li:last-child{border-bottom:none;}
.ref-list li b{color:var(--navy);}
.ref-empty{font-size:12px;color:var(--text-3);font-style:italic;}
.phase-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
.phase-row:last-child{border-bottom:none;}
.phase-row div{font-size:13px;line-height:1.5;color:var(--text);}
.phase-chip{flex-shrink:0;background:var(--blue-chip-light);color:var(--blue-chip);font-size:10.5px;font-weight:700;border-radius:6px;padding:4px 7px;text-align:center;white-space:nowrap;}
.notes-divider{border:none;border-top:1px dashed var(--border);margin:16px 0;}
.sub-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 10px;margin-bottom:7px;position:relative;background:var(--surface);}
.sub-item input.si-title{width:calc(100% - 26px);border:none;background:transparent;font-size:13px;font-weight:600;color:var(--text);outline:none;margin-bottom:5px;font-family:Inter,sans-serif;}
.sub-item textarea.si-body{width:100%;border:none;background:transparent;font-size:12.5px;color:var(--text-2);outline:none;resize:vertical;min-height:38px;line-height:1.45;font-family:Inter,sans-serif;}
.sub-item input.si-meta{width:100%;border:none;background:transparent;font-size:11.5px;color:var(--blue-chip);outline:none;margin-top:3px;font-family:Inter,sans-serif;}
.sub-item .si-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text-3);font-size:15px;font-weight:700;line-height:1;padding:2px;}
.sub-item .si-date{font-size:10.5px;color:var(--text-3);margin-bottom:3px;display:block;}
.btn-add-sub{width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text-2);font-size:12px;font-weight:600;font-family:Inter,sans-serif;}
.empty-zona{text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px;}
.resumen-text{font-size:12.5px;color:var(--text-2);line-height:1.5;padding:0 14px 10px;margin-top:-4px;}
.lesion-card.open .resumen-text{display:none;}
.lesion-list.compact .full-only{display:none;}
.lesion-list.compact .lesion-body{padding-bottom:10px;}
#app.locked .btn-add-sub,#app.locked .edit-only,#app.locked .si-del{display:none!important;}
#app.locked input[readonly],#app.locked textarea[readonly]{color:var(--text);opacity:1;}
.lock-hint{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-3);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;margin-bottom:12px;justify-content:center;}
#app:not(.locked) .lock-hint{background:var(--orange-light);color:var(--orange);border-color:transparent;}

/* ── VISTA 3D ── */
.body3d-wrap{display:flex;justify-content:center;padding:6px 0;}
#body3dCanvas{width:100%;max-width:340px;aspect-ratio:1/1.15;border-radius:var(--radius);touch-action:none;background:radial-gradient(circle at 50% 30%,#F2F5F9,#E4E9F1);}
.body3d-hint{text-align:center;font-size:11px;color:var(--text-3);margin-top:6px;}
@supports(padding:max(0px)){.panel{padding-bottom:max(40px,env(safe-area-inset-bottom));}}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:.25s;z-index:200;pointer-events:none;box-shadow:var(--shadow-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-box">
    <svg width="40" height="40" viewBox="0 0 36 36"><rect width="36" height="36" rx="9" fill="#1B2A4A"/><path d="M25 10.5C23.2 8.3 20.6 7 17.5 7 11.7 7 7 11.9 7 18s4.7 11 10.5 11c3.1 0 5.7-1.3 7.5-3.5" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/><path d="M11 18h3.2l1.6-3.6 2.4 6.4 1.6-2.8h5.2" stroke="#E87722" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    <h1>Atlas Clínico</h1>
    <p>Casartelli · uso personal</p>
    <input type="password" id="gatePass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkGate()">
    <button onclick="checkGate()">Entrar</button>
    <div class="gate-err" id="gateErr">Contraseña incorrecta.</div>
  </div>
</div>

<div class="app" id="app" style="display:none;">
  <div class="topbar">
    <button class="btn-back" id="btnBack" style="display:none;" onclick="goHome()">← Cuerpo</button>
    <div style="flex:1;">
      <h1 id="topTitle">Atlas Clínico</h1>
      <p id="topSub">Casartelli · MP 10722</p>
    </div>
    <button class="btn-lock" id="btnLock" onclick="toggleEditMode()" title="Bloquear/desbloquear edición">🔒</button>
  </div>
  <div class="panel" id="panel"></div>
</div>

<div class="toast" id="toast"></div>
<canvas id="body3dCanvas" style="display:none;"></canvas>

<script>
// ══════════════════ ESTADO / UTILS ══════════════════
let DATA = { zonas: {} };
let currentZona = null;
let openLesionIds = new Set();
let autoSaveTimer = null;
let viewMode = 'full'; // 'full' | 'compact'
let editMode = localStorage.getItem('atlas_edit_mode')==='1'; // bloqueado por defecto

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>el.classList.remove('show'),1800);
}
function saveDB(){ atlasRef.set(DATA); }
function debSave(){ clearTimeout(autoSaveTimer); autoSaveTimer=setTimeout(saveDB,700); }

// ══════════════════ LOGIN GATE ══════════════════
function checkGate(){
  const val=document.getElementById('gatePass').value;
  if(val==='Casartelli2026'){
    localStorage.setItem('atlas_auth','1');
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').style.display='flex';
    initApp();
  } else {
    document.getElementById('gateErr').style.display='block';
  }
}
// Si ya se logueó antes en este dispositivo/navegador, saltear el gate.
if(localStorage.getItem('atlas_auth')==='1'){
  document.addEventListener('DOMContentLoaded', ()=>{
    document.getElementById('gate').classList.add('hidden');
    document.getElementById('app').style.display='flex';
    initApp();
  });
}

// ══════════════════ ZONAS DEL CUERPO ══════════════════
const ZONAS = [
  {id:'cuello',    label:'Cuello',        active:true, x:150, y:80},
  {id:'hombro',    label:'Hombro',        active:true, x:100, y:112},
  {id:'hombro',    label:'Hombro',        active:true, x:200, y:112},
  {id:'columna',   label:'Columna',       active:true, x:150, y:165},
  {id:'codo',      label:'Codo',          active:true, x:65,  y:196},
  {id:'codo',      label:'Codo',          active:true, x:235, y:196},
  {id:'cadera',    label:'Cadera',        active:true, x:150, y:248},
  {id:'muneca',    label:'Muñeca / Mano', active:true, x:58,  y:276},
  {id:'muneca',    label:'Muñeca / Mano', active:true, x:242, y:276},
  {id:'rodilla',   label:'Rodilla',       active:true, x:122, y:396},
  {id:'rodilla',   label:'Rodilla',       active:true, x:178, y:396},
  {id:'tobillo',   label:'Tobillo / Pie', active:true, x:118, y:512},
  {id:'tobillo',   label:'Tobillo / Pie', active:true, x:182, y:512},
];
const ZONA_LABELS = {};
ZONAS.forEach(z=>ZONA_LABELS[z.id]=z.label);

function initApp(){
  document.getElementById('panel').innerHTML=`<div class="empty-zona">Cargando…</div>`;
  atlasRef.on('value', snap=>{
    const val=snap.val();
    if(!val){
      DATA = seedDefaultData();
      saveDB();
    } else {
      DATA = val;
      if(!DATA.zonas) DATA.zonas = {};
      migrateNewZonas();
    }
    render();
  }, err=>{
    document.getElementById('panel').innerHTML=`
      <div class="empty-zona" style="color:var(--red);text-align:left;line-height:1.6;">
        <b>No se pudo conectar con la base de datos.</b><br><br>
        Error: ${esc(err.message)}<br><br>
        Lo más probable es que las reglas de Firebase no dejen leer/escribir el nodo <code>atlas</code>.
        Entrá a Firebase Console → Realtime Database → Rules y agregá un bloque para <code>atlas</code>
        igual al que ya tenés para <code>consultorio</code>.
      </div>`;
  });
}

// Suma zonas nuevas del seed que todavía no existan en la base (no pisa nada
// que ya esté cargado/editado). Se corre cada vez que se abre la app.
function migrateNewZonas(){
  const defaults=seedDefaultData();
  let changed=false;
  Object.keys(defaults.zonas).forEach(zid=>{
    if(!DATA.zonas[zid]){ DATA.zonas[zid]=defaults.zonas[zid]; changed=true; }
  });
  if(changed) saveDB();
}

// Base de arranque con contenido para todas las zonas — pensada como punto de
// partida (formato + ejemplos con literatura estándar) para editar/expandir.
function seedDefaultData(){
  const mk=(nombre,resumen,descripcion,estadisticas,evaluacion,evolucion,protocolos)=>({
    id:uid(), nombre, resumen, descripcion, estadisticas,
    evaluacion:evaluacion.map(e=>({nombre:e[0],detalle:e[1]})),
    evolucion:evolucion.map(e=>({fase:e[0],tiempo:e[1],descripcion:e[2]})),
    protocolos:protocolos.map(p=>({nombre:p[0],contenido:p[1]})),
    experiencias:[], papers:[]
  });

  return { zonas: {
    rodilla:{ lesiones:[
      mk('Lesión de LCA (ligamento cruzado anterior)',
        'Rotura del LCA por mecanismo de pivote/desaceleración sin contacto. RTP típico 9-12 meses post reconstrucción.',
        'Rotura total o parcial del LCA, típicamente por valgo + rotación externa de tibia con pie fijo. Frecuente en deportes con cambios de dirección.',
        'La incidencia anual estimada en población general es baja, pero se dispara en deportes de pivoteo (fútbol, básquet, handball). El riesgo relativo es 2-8 veces mayor en mujeres que en hombres en el mismo deporte, atribuido a factores anatómicos, hormonales y de control neuromuscular. El riesgo de una segunda lesión (mismo lado o contralateral) es marcadamente mayor en menores de 18-25 años que retoman el deporte antes de los 9 meses o sin superar los criterios de LSI.',
        [['Lachman','Rodilla en 20-30° flexión, se tracciona la tibia hacia anterior estabilizando el fémur. Positivo: desplazamiento aumentado sin punto final firme.'],
         ['Pivot shift','Valgo + rotación interna en extensión, se flexiona progresivamente. Positivo: reducción brusca (clunk) ~20-30°, indica inestabilidad rotacional.']],
        [['Fase 1 · Control inicial','0-2 sem','Control de dolor/derrame, extensión completa, activación de cuádriceps, marcha sin claudicación.'],
         ['Fase 2 · Fuerza y ROM','2-12 sem','ROM completo, fortalecimiento cadena cerrada progresivo, propiocepción básica.'],
         ['Fase 3 · Readaptación','3-6 meses','LSI de fuerza >80%, inicio de carrera y pliometría progresiva.'],
         ['Fase 4 · Return to sport','9-12 meses','LSI ≥90% en tests funcionales, batería de saltos y readiness psicológica (ACL-RSI) antes del alta.']],
        [['Fortalecimiento de cuádriceps en cadena cerrada','Sentadilla, prensa y step-up progresivos priorizando control de valgo dinámico y carga simétrica entre miembros.']]),
      mk('Lesión meniscal',

// ══════════════════ VISTA 3D (Three.js) ══════════════════
// Modelo simple armado con primitivas (esferas/cilindros) posicionadas según
// los mismos puntos anatómicos del diagrama 2D — no es un atlas anatómico
// detallado, pero permite rotar y tocar zonas como referencia visual rápida.
let three3D = null; // {renderer, scene, camera, group, hotspots, animId}
let threeLoadPromise = null;

function loadThreeScript(){
  if(window.THREE) return Promise.resolve();
  if(threeLoadPromise) return threeLoadPromise;
  threeLoadPromise = new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error('No se pudo cargar Three.js (¿sin conexión?)'));
    document.head.appendChild(s);
  });
  return threeLoadPromise;
}

// Convierte un punto del sistema de coordenadas del SVG 2D (0-300, 0-560) a
// coordenadas 3D (x derecha, y arriba, z=0 — pose frontal en reposo).
function p3(x,y){ return {x:(x-150)*0.045, y:(280-y)*0.045, z:0}; }

async function init3D(){
  await loadThreeScript();
  const THREE=window.THREE;
  const canvas=document.getElementById('body3dCanvas');

  if(!three3D){
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(40, 1, 0.1, 100);
    camera.position.set(0,0,22);
    let renderer;
    try{
      renderer=new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
    } catch(e){
      throw new Error('WebGL no disponible en este navegador');
    }
    renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));

    scene.add(new THREE.AmbientLight(0xffffff,0.75));
    const dir=new THREE.DirectionalLight(0xffffff,0.6);
    dir.position.set(3,6,8);
    scene.add(dir);

    const group=new THREE.Group();
    scene.add(group);

    const skinMat=new THREE.MeshStandardMaterial({color:0xE4E9F1, roughness:0.6, metalness:0.05});
    const limbMat=new THREE.MeshStandardMaterial({color:0xC7D0DE, roughness:0.6, metalness:0.05});

    function sphereAt(pt,r,mat){
      const m=new THREE.Mesh(new THREE.SphereGeometry(r,20,16),mat);
      m.position.set(pt.x,pt.y,pt.z);
      group.add(m);
      return m;
    }
    function cylBetween(p1,p2,rTop,rBottom,mat){
      const a=new THREE.Vector3(p1.x,p1.y,p1.z), b=new THREE.Vector3(p2.x,p2.y,p2.z);
      const dir=new THREE.Vector3().subVectors(b,a);
      const len=dir.length();
      const geo=new THREE.CylinderGeometry(rTop,rBottom,len,16,1);
      const m=new THREE.Mesh(geo,mat);
      const mid=new THREE.Vector3().addVectors(a,b).multiplyScalar(0.5);
      m.position.copy(mid);
      m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
      group.add(m);
      return m;
    }

    // Puntos anatómicos (mismos que el diagrama 2D)
    const P={
      head:p3(150,48), neck:p3(150,80), shoulderL:p3(100,112), shoulderR:p3(200,112),
      elbowL:p3(65,168), elbowR:p3(235,168), wristL:p3(58,236), wristR:p3(242,236),
      chest:p3(150,140), waist:p3(150,232), hipL:p3(126,270), hipR:p3(174,270),
      kneeL:p3(122,368), kneeR:p3(178,368), ankleL:p3(118,486), ankleR:p3(182,486)
    };

    sphereAt(P.head,1.35,skinMat);
    cylBetween(P.neck,P.chest,0.55,1.9,skinMat); // torso superior (hombros)
    cylBetween(P.chest,P.waist,1.9,1.45,skinMat); // torso inferior (a la cintura)
    cylBetween(P.waist,{x:0,y:P.hipL.y-0.3,z:0},1.9,2.3,skinMat); // pelvis
    // Brazos
    cylBetween(P.shoulderL,P.elbowL,0.65,0.5,limbMat);
    cylBetween(P.elbowL,P.wristL,0.5,0.4,limbMat);
    cylBetween(P.shoulderR,P.elbowR,0.65,0.5,limbMat);
    cylBetween(P.elbowR,P.wristR,0.5,0.4,limbMat);
    sphereAt(P.shoulderL,0.65,skinMat); sphereAt(P.elbowL,0.5,skinMat); sphereAt(P.wristL,0.42,skinMat);
    sphereAt(P.shoulderR,0.65,skinMat); sphereAt(P.elbowR,0.5,skinMat); sphereAt(P.wristR,0.42,skinMat);
    // Piernas
    cylBetween(P.hipL,P.kneeL,0.85,0.6,limbMat);
    cylBetween(P.kneeL,P.ankleL,0.6,0.42,limbMat);
    cylBetween(P.hipR,P.kneeR,0.85,0.6,limbMat);
    cylBetween(P.kneeR,P.ankleR,0.6,0.42,limbMat);
    sphereAt(P.hipL,0.75,skinMat); sphereAt(P.kneeL,0.58,skinMat); sphereAt(P.ankleL,0.4,skinMat);
    sphereAt(P.hipR,0.75,skinMat); sphereAt(P.kneeR,0.58,skinMat); sphereAt(P.ankleR,0.4,skinMat);

    // Hotspots (esferas naranjas tocables, mismas zonas que el diagrama 2D)
    const hotMat=new THREE.MeshStandardMaterial({color:0xE87722, roughness:0.4});
    const lockMat=new THREE.MeshStandardMaterial({color:0xC7CCD6, roughness:0.6});
    const hotspots=[];
    const hotspotDefs=[
      ['cuello',P.neck],['hombro',P.shoulderL],['hombro',P.shoulderR],
      ['columna',{x:0,y:P.chest.y-0.5,z:1.1}],['codo',P.elbowL],['codo',P.elbowR],
      ['cadera',{x:0,y:P.waist.y-0.7,z:0}],['muneca',P.wristL],['muneca',P.wristR],
      ['rodilla',P.kneeL],['rodilla',P.kneeR],['tobillo',P.ankleL],['tobillo',P.ankleR]
    ];
    hotspotDefs.forEach(([zid,pt])=>{
      const active=ZONAS.find(z=>z.id===zid)?.active;
      const m=sphereAt(pt,0.42,active?hotMat:lockMat);
      m.userData={zonaId:zid, active};
      hotspots.push(m);
    });

    group.rotation.x=0.05;

    three3D={renderer, scene, camera, group, hotspots, animId:null, dragging:false, lastX:0, lastY:0, totalDrag:0};

    // Rotar arrastrando (mouse + touch vía pointer events)
    canvas.addEventListener('pointerdown', e=>{
      three3D.dragging=true; three3D.lastX=e.clientX; three3D.lastY=e.clientY; three3D.totalDrag=0;
      canvas.setPointerCapture(e.pointerId);
    });
    canvas.addEventListener('pointermove', e=>{
      if(!three3D.dragging) return;
      const dx=e.clientX-three3D.lastX, dy=e.clientY-three3D.lastY;
      three3D.group.rotation.y += dx*0.008;
      three3D.group.rotation.x = Math.max(-0.6,Math.min(0.6, three3D.group.rotation.x + dy*0.005));
      three3D.totalDrag += Math.abs(dx)+Math.abs(dy);
      three3D.lastX=e.clientX; three3D.lastY=e.clientY;
    });
    canvas.addEventListener('pointerup', e=>{
      three3D.dragging=false;
      if(three3D.totalDrag<6){ handle3DTap(e); }
    });
  }

  resize3D();
  window.addEventListener('resize', resize3D);
  start3DLoop();
}

function resize3D(){
  if(!three3D) return;
  const canvas=document.getElementById('body3dCanvas');
  const w=canvas.clientWidth||300, h=canvas.clientHeight||340;
  if(w===0||h===0) return;
  three3D.renderer.setSize(w,h,false);
  three3D.camera.aspect=w/h;
  three3D.camera.updateProjectionMatrix();
}

function handle3DTap(e){
  const THREE=window.THREE;
  const canvas=document.getElementById('body3dCanvas');
  const rect=canvas.getBoundingClientRect();
  const mouse=new THREE.Vector2(
    ((e.clientX-rect.left)/rect.width)*2-1,
    -((e.clientY-rect.top)/rect.height)*2+1
  );
  const raycaster=new THREE.Raycaster();
  raycaster.setFromCamera(mouse, three3D.camera);
  const hits=raycaster.intersectObjects(three3D.hotspots);
  if(hits.length){
    const d=hits[0].object.userData;
    if(d.active) openZona(d.zonaId); else showToast('Próximamente');
  }
}

function start3DLoop(){
  if(!three3D) return;
  if(three3D.animId) return;
  const loop=()=>{
    if(bodyViewMode!=='3d'||!three3D){ three3D&&(three3D.animId=null); return; }
    three3D.renderer.render(three3D.scene, three3D.camera);
    three3D.animId=requestAnimationFrame(loop);
  };
  loop();
}
function stop3DLoop(){
  if(three3D&&three3D.animId){ cancelAnimationFrame(three3D.animId); three3D.animId=null; }
}

</script>
