<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1B2A4A; --navy-light:#2E4170; --orange:#E87722; --orange-light:#FEF0E3;
  --bg:#FFFFFF; --surface:#F7F8FA; --border:#E2E5EA;
  --text:#1A1A2E; --text-2:#5A6373; --text-3:#9AA0AD;
  --green:#1B5E3B; --green-light:#EAF5EE; --red:#C0392B; --red-light:#FDECEA;
  --blue-chip:#1A4E8C; --blue-chip-light:#EBF3FB;
  --radius:12px; --radius-sm:8px;
  --shadow:0 2px 12px rgba(0,0,0,.08); --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  /* Biblioteca: paleta cálida de lectura, distinta del Atlas clínico */
  --paper-bg:#FAF6EE; --paper-surface:#F1EADA; --paper-border:#E2D8C2;
  --ink:#2B241C; --ink-2:#6B6152; --ink-3:#9C927E;
  --rust:#B15A2E; --rust-light:#F5E3D5; --gold:#B98A2E;
  --pend:#B4791D; --pend-light:#FBF0DD;
  --leyendo:#2F6690; --leyendo-light:#E3EEF5;
  --leido:#3F7A52; --leido-light:#E7F3EA;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--surface);color:var(--text);-webkit-tap-highlight-color:transparent;}
input,textarea,select{font-family:'Inter',sans-serif;}
button{cursor:pointer;}

/* ── LOGIN GATE ── */
.gate{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.gate.hidden{display:none;}
.gate-box{background:#fff;border-radius:var(--radius);padding:28px 24px;width:100%;max-width:320px;text-align:center;}
.gate-box svg{margin-bottom:10px;}
.gate-box h1{font-size:16px;color:var(--navy);margin-bottom:2px;}
.gate-box p{font-size:12px;color:var(--text-2);margin-bottom:16px;}
.gate-box input{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;font-size:14px;outline:none;margin-bottom:10px;}
.gate-box input:focus{border-color:var(--navy);}
.gate-box button{width:100%;padding:11px;background:var(--orange);color:#fff;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:600;}
.gate-err{color:var(--red);font-size:12px;margin-top:8px;display:none;}

/* ── APP SHELL ── */
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--navy);color:#fff;position:sticky;top:0;z-index:20;}
.topbar h1{font-size:15px;font-weight:700;flex:1;}
.topbar p{font-size:10.5px;color:rgba(255,255,255,.5);}
.btn-back{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;padding:7px 10px;font-size:13px;font-weight:600;flex-shrink:0;}
.btn-lock{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:8px;padding:7px 9px;font-size:15px;flex-shrink:0;line-height:1;}
.btn-lock.unlocked{background:var(--orange);}
.panel{padding:18px 16px 40px;flex:1;}

/* Tablet / landscape (iPad, etc.): en pantallas anchas la columna angosta de
   celular deja huecos enormes a los costados, así que reorganizamos el
   contenido para usar el espacio en vez de solo centrarlo. */
@media (min-width:680px){
  .app{max-width:none;}
  .panel{padding:24px 32px 48px;max-width:760px;margin:0 auto;width:100%;}
  .lesion-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start;}
  .lesion-list.compact{grid-template-columns:1fr 1fr 1fr;}
  .zona-header{max-width:760px;margin:0 auto 14px;}
  .body-screen{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:36px;text-align:left;}
  .body-screen .body-intro{text-align:left;}
  .body-screen .body-intro p{margin:0;}
  .body-screen .body-wrap{flex-shrink:0;padding:0;}
  .body-screen .body-wrap svg{max-width:300px;}
  .body-screen .body-col-right{flex:1;min-width:0;}
  .body-screen .zonas-legend{justify-content:flex-start;margin-top:16px;}
}
@media (min-width:680px) and (orientation:portrait){
  .lesion-list{grid-template-columns:1fr;}
  .body-screen{flex-direction:column;text-align:center;gap:6px;}
  .body-screen .body-intro{text-align:center;}
  .body-screen .zonas-legend{justify-content:center;}
}

/* ── VISTA CUERPO ── */
.body-intro{text-align:center;margin-bottom:6px;}
.body-intro h2{font-size:16px;color:var(--navy);margin-bottom:4px;}
.body-intro p{font-size:12.5px;color:var(--text-2);line-height:1.5;max-width:320px;margin:0 auto;}
.body-wrap{display:flex;justify-content:center;padding:10px 0 6px;}
.body-wrap svg{width:100%;max-width:280px;height:auto;}
.body-figure{fill:url(#bodyGrad);stroke:var(--navy);stroke-width:2;stroke-linejoin:round;filter:url(#bodyShadow);}
.body-limb{stroke:url(#limbGrad);stroke-linecap:round;fill:none;filter:url(#bodyShadow);}
.body-limb-line{stroke:var(--navy);fill:none;stroke-linecap:round;}
.hotspot{cursor:pointer;}
.hotspot circle.dot{transition:r .12s,fill .12s;stroke:#fff;stroke-width:2.5;}
.hotspot circle.pulse{fill:none;stroke:var(--orange);stroke-width:2;opacity:0;}
.hotspot.active circle.dot{fill:var(--orange);}
.hotspot.active circle.pulse{animation:pulseRing 2.2s ease-out infinite;}
.hotspot.active:active circle.dot{r:12;}
.hotspot.locked circle.dot{fill:#C7CCD6;}
@keyframes pulseRing{0%{r:9;opacity:.55;}100%{r:18;opacity:0;}}
.zonas-legend{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px;}
.legend-chip{font-size:10.5px;padding:5px 10px;border-radius:20px;font-weight:600;}
.legend-chip.active{background:var(--orange-light);color:var(--orange);}
.legend-chip.locked{background:var(--surface);color:var(--text-3);border:1px solid var(--border);}

/* ── VISTA ZONA ── */
.zona-header{margin-bottom:14px;}
.zona-header h2{font-size:18px;color:var(--navy);}
.zona-search{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;outline:none;margin:10px 0 10px;background:var(--surface);}
.zona-search:focus{border-color:var(--navy);background:#fff;}
.view-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:30px;padding:3px;margin-bottom:14px;}
.view-toggle button{flex:1;border:none;background:transparent;padding:8px 6px;font-size:12.5px;font-weight:600;color:var(--text-2);border-radius:24px;font-family:Inter,sans-serif;}
.view-toggle button.on{background:var(--navy);color:#fff;}
.lesion-list{display:flex;flex-direction:column;gap:10px;}
.lesion-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--bg);}
.lesion-head{display:flex;align-items:center;gap:8px;padding:14px;background:var(--surface);cursor:pointer;}
.lesion-title-block{flex:1;min-width:0;}
.lesion-title-block h3{font-size:15px;font-weight:700;color:var(--navy);line-height:1.3;}
.lesion-chevron{color:var(--text-3);font-size:12px;transition:transform .15s;flex-shrink:0;}
.lesion-card.open .lesion-chevron{transform:rotate(180deg);}
.lesion-body{display:none;padding:14px;}
.lesion-card.open .lesion-body{display:block;}
.ref-text{font-size:13px;line-height:1.6;color:var(--text);margin-bottom:14px;}
.ref-block{margin-bottom:14px;}
.sub-section-title{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--orange);margin-bottom:8px;}
.ref-list{list-style:none;}
.ref-list li{font-size:13px;line-height:1.55;color:var(--text);padding:8px 0;border-bottom:1px solid var(--border);}
.ref-list li:last-child{border-bottom:none;}
.ref-list li b{color:var(--navy);}
.ref-empty{font-size:12px;color:var(--text-3);font-style:italic;}
.phase-row{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);}
.phase-row:last-child{border-bottom:none;}
.phase-row div{font-size:13px;line-height:1.5;color:var(--text);}
.phase-chip{flex-shrink:0;background:var(--blue-chip-light);color:var(--blue-chip);font-size:10.5px;font-weight:700;border-radius:6px;padding:4px 7px;text-align:center;white-space:nowrap;}
.notes-divider{border:none;border-top:1px dashed var(--border);margin:16px 0;}
.sub-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 10px;margin-bottom:7px;position:relative;background:var(--surface);}
.sub-item input.si-title{width:calc(100% - 26px);border:none;background:transparent;font-size:13px;font-weight:600;color:var(--text);outline:none;margin-bottom:5px;font-family:Inter,sans-serif;}
.sub-item textarea.si-body{width:100%;border:none;background:transparent;font-size:12.5px;color:var(--text-2);outline:none;resize:vertical;min-height:38px;line-height:1.45;font-family:Inter,sans-serif;}
.sub-item input.si-meta{width:100%;border:none;background:transparent;font-size:11.5px;color:var(--blue-chip);outline:none;margin-top:3px;font-family:Inter,sans-serif;}
.sub-item .si-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text-3);font-size:15px;font-weight:700;line-height:1;padding:2px;}
.sub-item .si-date{font-size:10.5px;color:var(--text-3);margin-bottom:3px;display:block;}
.btn-add-sub{width:100%;padding:8px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text-2);font-size:12px;font-weight:600;font-family:Inter,sans-serif;}
.empty-zona{text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px;}
.resumen-text{font-size:12.5px;color:var(--text-2);line-height:1.5;padding:0 14px 10px;margin-top:-4px;}
.lesion-card.open .resumen-text{display:none;}
.lesion-list.compact .full-only{display:none;}
.lesion-list.compact .lesion-body{padding-bottom:10px;}
.ref-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:5px;}
.ref-edit{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 10px;font-size:13px;line-height:1.6;color:var(--text);outline:none;resize:none;overflow:hidden;font-family:Inter,sans-serif;background:var(--surface);}
.ref-edit:focus{border-color:var(--navy);background:#fff;}
.title-edit{flex:1;border:none;background:transparent;font-size:15px;font-weight:700;color:var(--navy);outline:none;font-family:Inter,sans-serif;}
textarea.autogrow{resize:none;overflow:hidden;}
.lock-hint{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-3);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 12px;margin-bottom:12px;justify-content:center;}
#app:not(.locked) .lock-hint{background:var(--orange-light);color:var(--orange);border-color:transparent;}
@supports(padding:max(0px)){.panel{padding-bottom:max(40px,env(safe-area-inset-bottom));}}

/* ── BIBLIOTECA (modo lectura) ── */
.app.biblioteca-mode{background:var(--paper-bg);}
.app.biblioteca-mode .topbar{background:var(--rust);}
.btn-switch{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:7px 10px;font-size:12.5px;font-weight:600;flex-shrink:0;white-space:nowrap;font-family:Inter,sans-serif;}

.bib-dash{display:flex;gap:8px;margin-bottom:14px;}
.bib-stat{flex:1;background:var(--paper-surface);border:1px solid var(--paper-border);border-radius:var(--radius);padding:10px 8px;text-align:center;}
.bib-stat-num{display:block;font-family:'Lora',serif;font-size:20px;font-weight:700;color:var(--rust);}
.bib-stat-label{font-size:10px;color:var(--ink-2);text-transform:uppercase;letter-spacing:.05em;}

.bib-search{width:100%;border:1px solid var(--paper-border);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;outline:none;margin-bottom:10px;background:#fff;color:var(--ink);font-family:Inter,sans-serif;}
.bib-search:focus{border-color:var(--rust);}

.bib-tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;}
.bib-tabs button{flex-shrink:0;border:1px solid var(--paper-border);background:#fff;color:var(--ink-2);padding:7px 12px;border-radius:20px;font-size:12px;font-weight:600;font-family:Inter,sans-serif;display:flex;align-items:center;gap:5px;}
.bib-tabs button.on{background:var(--rust);border-color:var(--rust);color:#fff;}
.tab-count{background:rgba(0,0,0,.08);border-radius:10px;padding:1px 6px;font-size:10.5px;}
.bib-tabs button.on .tab-count{background:rgba(255,255,255,.25);}

.bib-zona-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;align-items:center;}
.filter-label{font-size:10.5px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-right:2px;}
.zona-chip{font-size:11px;padding:5px 11px;border-radius:20px;font-weight:600;background:var(--paper-surface);color:var(--ink-2);border:1px solid var(--paper-border);cursor:pointer;}
.zona-chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}

.bib-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
.art-card{border:1px solid var(--paper-border);border-radius:var(--radius);overflow:hidden;background:#fff;}
.art-head{display:flex;align-items:center;gap:10px;padding:13px 14px;cursor:pointer;}
.art-estado-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.art-estado-dot.estado-pendiente{background:var(--pend);}
.art-estado-dot.estado-leyendo{background:var(--leyendo);}
.art-estado-dot.estado-leido{background:var(--leido);}
.art-title-block{flex:1;min-width:0;}
.art-title-block h3{font-family:'Lora',serif;font-size:15px;font-weight:600;color:var(--ink);line-height:1.3;}
.art-meta{font-size:11.5px;color:var(--ink-3);margin-top:2px;}
.art-rating{font-size:11px;color:var(--gold);white-space:nowrap;flex-shrink:0;}
.art-chevron{color:var(--ink-3);font-size:12px;transition:transform .15s;flex-shrink:0;}
.art-card.open .art-chevron{transform:rotate(180deg);}
.art-preview{font-size:12px;color:var(--ink-2);line-height:1.5;padding:0 14px 12px;margin-top:-4px;}
.art-card.open .art-preview{display:none;}
.art-body{display:none;padding:0 14px 14px;}
.art-card.open .art-body{display:block;}

.art-row-estado{display:flex;gap:6px;margin-bottom:10px;}
.estado-btn{flex:1;border:1px solid var(--paper-border);background:var(--paper-surface);color:var(--ink-2);padding:7px 4px;border-radius:var(--radius-sm);font-size:11.5px;font-weight:600;font-family:Inter,sans-serif;}
.estado-btn.on.pend{background:var(--pend-light);color:var(--pend);border-color:var(--pend);}
.estado-btn.on.leyendo{background:var(--leyendo-light);color:var(--leyendo);border-color:var(--leyendo);}
.estado-btn.on.leido{background:var(--leido-light);color:var(--leido);border-color:var(--leido);}

.art-input{width:100%;border:1px solid var(--paper-border);border-radius:var(--radius-sm);padding:9px 10px;font-size:13px;color:var(--ink);outline:none;margin-bottom:8px;font-family:Inter,sans-serif;background:var(--paper-surface);}
.art-input:focus{border-color:var(--rust);background:#fff;}
.art-input.title{font-family:'Lora',serif;font-weight:600;font-size:14px;}
.art-row-select{display:flex;gap:8px;margin-bottom:8px;}
.art-select{flex:1;border:1px solid var(--paper-border);border-radius:var(--radius-sm);padding:9px 10px;font-size:12.5px;color:var(--ink);background:var(--paper-surface);font-family:Inter,sans-serif;}
.art-stars-edit{display:flex;align-items:center;gap:2px;padding:0 6px;}
.art-stars-edit span{font-size:16px;color:var(--paper-border);cursor:pointer;}
.art-stars-edit span.filled{color:var(--gold);}
.art-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin-bottom:5px;margin-top:8px;}
.art-textarea{width:100%;border:1px solid var(--paper-border);border-radius:var(--radius-sm);padding:9px 10px;font-size:13px;line-height:1.55;color:var(--ink);outline:none;resize:none;overflow:hidden;font-family:Inter,sans-serif;background:var(--paper-surface);min-height:44px;}
.art-textarea:focus{border-color:var(--rust);background:#fff;}
.btn-del-article{width:100%;padding:8px;border:1.5px dashed var(--red);border-radius:var(--radius-sm);background:transparent;color:var(--red);font-size:12px;font-weight:600;font-family:Inter,sans-serif;margin-top:6px;}
.btn-add-article{width:100%;padding:12px;border:1.5px dashed var(--rust);border-radius:var(--radius);background:var(--paper-surface);color:var(--rust);font-size:13px;font-weight:700;font-family:Inter,sans-serif;}
.bib-empty{text-align:center;padding:40px 20px;color:var(--ink-3);font-size:13px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:500;opacity:0;transition:.25s;z-index:200;pointer-events:none;box-shadow:var(--shadow-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="gate-box">
    <svg width="40" height="40" viewBox="0 0 36 36"><rect width="36" height="36" rx="9" fill="#1B2A4A"/><path d="M25 10.5C23.2 8.3 20.6 7 17.5 7 11.7 7 7 11.9 7 18s4.7 11 10.5 11c3.1 0 5.7-1.3 7.5-3.5" stroke="white" stroke-width="3" stroke-linecap="round" fill="none"/><path d="M11 18h3.2l1.6-3.6 2.4 6.4 1.6-2.8h5.2" stroke="#E87722" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
    <h1>Biblioteca</h1>
    <p>Casartelli · lectura + atlas clínico</p>
    <input type="password" id="gatePass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')checkGate()">
    <button onclick="checkGate()">Entrar</button>
    <div class="gate-err" id="gateErr">Contraseña incorrecta.</div>
  </div>
</div>

<div class="app" id="app" style="display:none;">
  <div class="topbar">
    <button class="btn-back" id="btnBack" style="display:none;" onclick="goBack()">← Cuerpo</button>
    <div style="flex:1;">
      <h1 id="topTitle">Biblioteca</h1>
      <p id="topSub">Casartelli · lectura clínica</p>
    </div>
    <button class="btn-switch" id="btnSwitch" onclick="goToAtlas()" title="Ir al Atlas de lesiones">🩻 Atlas</button>
    <button class="btn-lock" id="btnLock" style="display:none;" onclick="toggleEditMode()" title="Bloquear/desbloquear edición">🔒</button>
  </div>
  <div class="panel" id="panel"></div>
</div>

<div class="toast" id="toast"></div>

<script>

let DATA = { zonas: {} };

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t=setTimeout(()=>el.classList.remove('show'),1800);
}
function saveDB(){ atlasRef.set(DATA); }
function debSave(){ clearTimeout(autoSaveTimer); autoSaveTimer=setTimeout(saveDB,700); }

function initApp(){
  document.getElementById('panel').innerHTML=`<div class="empty-zona">Cargando…</div>`;

  bibliotecaRef.on('value', snap=>{
    const val=snap.val();
    if(!val){
      BIB = seedDefaultBiblioteca();
      bibSaveDB();
    } else {
      BIB = val.articulos ? val : { articulos: [] };
      migrateBiblioteca();
    }
    if(screen==='biblioteca') render();
  }, err=>{
    if(screen==='biblioteca') document.getElementById('panel').innerHTML=`
      <div class="empty-zona" style="color:var(--red);text-align:left;line-height:1.6;">
        <b>No se pudo conectar con la base de datos.</b><br><br>
        Error: ${esc(err.message)}<br><br>
        Lo más probable es que las reglas de Firebase no dejen leer/escribir el nodo <code>biblioteca</code>.
        Entrá a Firebase Console → Realtime Database → Rules y agregá un bloque para <code>biblioteca</code>
        igual al que ya tenés para <code>consultorio</code> y <code>atlas</code>.
      </div>`;
  });

  atlasRef.on('value', snap=>{
    const val=snap.val();
    if(!val){
      DATA = seedDefaultData();
      saveDB();
    } else {
      DATA = val;
      if(!DATA.zonas) DATA.zonas = {};
      migrateNewZonas();
    }
    if(screen==='atlas') render();
  }, err=>{
    if(screen==='atlas') document.getElementById('panel').innerHTML=`
      <div class="empty-zona" style="color:var(--red);text-align:left;line-height:1.6;">
        <b>No se pudo conectar con la base de datos.</b><br><br>
        Error: ${esc(err.message)}<br><br>
        Lo más probable es que las reglas de Firebase no dejen leer/escribir el nodo <code>atlas</code>.
        Entrá a Firebase Console → Realtime Database → Rules y agregá un bloque para <code>atlas</code>
        igual al que ya tenés para <code>consultorio</code>.
      </div>`;
  });
}

// Suma zonas nuevas del seed que todavía no existan en la base (no pisa nada
// que ya esté cargado/editado). Se corre cada vez que se abre la app.
function migrateNewZonas(){
  const defaults=seedDefaultData();
  let changed=false;
  Object.keys(defaults.zonas).forEach(zid=>{
    if(!DATA.zonas[zid]){ DATA.zonas[zid]=defaults.zonas[zid]; changed=true; }
  });
  if(changed) saveDB();
}

function render(){
  applyEditModeUI();
  const app=document.getElementById('app');
  if(app) app.classList.toggle('biblioteca-mode', screen==='biblioteca');
  if(screen==='biblioteca'){ renderBibliotecaView(); }
  else if(currentZona){ renderZonaView(); }
  else { renderBodyView(); }
}

function toggleEditMode(){
  editMode=!editMode;
  localStorage.setItem('atlas_edit_mode', editMode?'1':'0');
  if(editMode) showToast('Edición desbloqueada'); else showToast('Contenido bloqueado (solo lectura)');
  render();
}
function applyEditModeUI(){
  const app=document.getElementById('app');
  const btn=document.getElementById('btnLock');
  if(!app||!btn) return;
  app.classList.toggle('locked', !editMode);
  btn.textContent = editMode ? '🔓' : '🔒';
  btn.classList.toggle('unlocked', editMode);
}

function goHome(){ currentZona=null; render(); }

// Navegación entre Biblioteca (pantalla principal) y Atlas de lesiones (secundaria)
function goToAtlas(){ screen='atlas'; currentZona=null; render(); }
function goToBiblioteca(){ screen='biblioteca'; render(); }
function goBack(){
  if(screen==='atlas'){
    if(currentZona) goHome();
    else goToBiblioteca();
  }
}

function openZona(zonaId){ currentZona=zonaId; openLesionIds=new Set(); render(); }

// ══════════════════ VISTA: ZONA (lista de lesiones) ══════════════════
function getZonaData(zonaId){
  if(!DATA.zonas[zonaId]) DATA.zonas[zonaId]={lesiones:[]};
  if(!DATA.zonas[zonaId].lesiones) DATA.zonas[zonaId].lesiones=[];
  return DATA.zonas[zonaId];
}

function renderZonaView(){
  document.getElementById('btnBack').style.display='inline-block';
  document.getElementById('btnBack').textContent='← Cuerpo';
  document.getElementById('btnSwitch').style.display='none';
  document.getElementById('btnLock').style.display='inline-block';
  document.getElementById('topTitle').textContent=ZONA_LABELS[currentZona]||'Zona';
  document.getElementById('topSub').textContent='Lesiones, evaluación, evolución, manejo, casos y papers';

  const z=getZonaData(currentZona);
  const q=(document.getElementById('zonaSearchInput')?document.getElementById('zonaSearchInput').value:'').toLowerCase();
  const lesiones=z.lesiones.filter(l=>!q||(l.nombre||'').toLowerCase().includes(q));

  const cardsHtml=lesiones.length? lesiones.map(l=>buildLesionCard(l)).join('') :
    `<div class="empty-zona">${z.lesiones.length?'No hay lesiones que matcheen la búsqueda.':'Todavía no hay lesiones cargadas en esta zona.'}</div>`;

  document.getElementById('panel').innerHTML=`
    <div class="zona-header">
      <input class="zona-search" id="zonaSearchInput" placeholder="Buscar lesión…" value="${esc(q)}" oninput="renderZonaView()">
      <div class="view-toggle">
        <button class="${viewMode==='compact'?'on':''}" onclick="setViewMode('compact')">Acotada</button>
        <button class="${viewMode==='full'?'on':''}" onclick="setViewMode('full')">Completa</button>
      </div>
      ${editMode?'<div class="lock-hint">✎ Edición activada — el candado de arriba vuelve a modo lectura</div>':''}
    </div>
    <div class="lesion-list ${viewMode==='compact'?'compact':''}">${cardsHtml}</div>
  `;
  autoGrowAll();
}

function setViewMode(mode){ viewMode=mode; renderZonaView(); }

function buildLesionCard(l){
  const open=openLesionIds.has(l.id);

  // Texto de referencia (nombre/resumen/descripción/estadísticas): se ve como
  // párrafo normal; con el candado abierto se convierte en textarea que crece
  // solo, sin achicar la caja ni obligar a scrollear adentro.
  const refField=(field,val,ph,extraClass)=>editMode
    ? `<textarea class="ref-edit ${extraClass||''}" placeholder="${ph}" oninput="autoGrow(this);updateLesionField('${l.id}','${field}',this.value)">${esc(val)}</textarea>`
    : `<p class="ref-text ${extraClass||''}">${esc(val)||'<span class="ref-empty">(vacío)</span>'}</p>`;

  const evalHtml=(l.evaluacion||[]).map((e,i)=> editMode ? `
    <div class="sub-item">
      <button class="si-del" onclick="removeSubItem('${l.id}','evaluacion',${i})" title="Eliminar">×</button>
      <input class="si-title" value="${esc(e.nombre)}" placeholder="Nombre del test" oninput="updateSubItem('${l.id}','evaluacion',${i},'nombre',this.value)">
      <textarea class="si-body autogrow" placeholder="Cómo se hace y qué indica un resultado positivo…" oninput="autoGrow(this);updateSubItem('${l.id}','evaluacion',${i},'detalle',this.value)">${esc(e.detalle)}</textarea>
    </div>` : `
    <li><b>${esc(e.nombre)}</b><span class="compact-hide"> — ${esc(e.detalle)}</span></li>`).join('');

  const evolHtml=(l.evolucion||[]).map((ph,i)=> editMode ? `
    <div class="sub-item">
      <button class="si-del" onclick="removeSubItem('${l.id}','evolucion',${i})" title="Eliminar">×</button>
      <input class="si-meta" value="${esc(ph.tiempo)}" placeholder="Tiempo (ej. 0-2 sem)" oninput="updateSubItem('${l.id}','evolucion',${i},'tiempo',this.value)">
      <input class="si-title" value="${esc(ph.fase)}" placeholder="Nombre de la fase" oninput="updateSubItem('${l.id}','evolucion',${i},'fase',this.value)">
      <textarea class="si-body autogrow" placeholder="Objetivos, hitos, criterios de progresión…" oninput="autoGrow(this);updateSubItem('${l.id}','evolucion',${i},'descripcion',this.value)">${esc(ph.descripcion)}</textarea>
    </div>` : `
    <div class="phase-row">
      <span class="phase-chip">${esc(ph.tiempo)}</span>
      <div><b>${esc(ph.fase)}</b><span class="compact-hide"> — ${esc(ph.descripcion)}</span></div>
    </div>`).join('');

  const protoHtml=(l.protocolos||[]).map((pr,i)=> editMode ? `
    <div class="sub-item">
      <button class="si-del" onclick="removeSubItem('${l.id}','protocolos',${i})" title="Eliminar">×</button>
      <input class="si-title" value="${esc(pr.nombre)}" placeholder="Nombre del protocolo" oninput="updateSubItem('${l.id}','protocolos',${i},'nombre',this.value)">
      <textarea class="si-body autogrow" placeholder="Pasos, series/reps, progresión, criterios…" oninput="autoGrow(this);updateSubItem('${l.id}','protocolos',${i},'contenido',this.value)">${esc(pr.contenido)}</textarea>
    </div>` : `
    <li><b>${esc(pr.nombre)}</b> — ${esc(pr.contenido)}</li>`).join('') ||
    (editMode ? '' : '<li class="ref-empty">Sin protocolos cargados todavía.</li>');

  // Experiencias y papers: siempre editables (no dependen del candado), es tu
  // cuaderno de notas de uso diario.
  const papersHtml=(l.papers||[]).map((pp,i)=>`
    <div class="sub-item">
      <button class="si-del" onclick="removeSubItem('${l.id}','papers',${i})" title="Eliminar">×</button>
      <input class="si-title" value="${esc(pp.titulo)}" placeholder="Título del paper" oninput="updateSubItem('${l.id}','papers',${i},'titulo',this.value)">
      <input class="si-meta" value="${esc(pp.autorAnio)}" placeholder="Autor, año" oninput="updateSubItem('${l.id}','papers',${i},'autorAnio',this.value)">
      <input class="si-meta" value="${esc(pp.link)}" placeholder="Link (opcional)" oninput="updateSubItem('${l.id}','papers',${i},'link',this.value)">
      <textarea class="si-body autogrow" placeholder="Resumen / conclusión clave…" oninput="autoGrow(this);updateSubItem('${l.id}','papers',${i},'resumen',this.value)">${esc(pp.resumen)}</textarea>
    </div>`).join('') || '<div class="ref-empty">Sin papers cargados todavía. Tocá "+ Agregar paper" para sumar el primero.</div>';

  const expHtml=(l.experiencias||[]).map((ex,i)=>`
    <div class="sub-item">
      <button class="si-del" onclick="removeSubItem('${l.id}','experiencias',${i})" title="Eliminar">×</button>
      <input type="date" class="si-date" value="${esc(ex.fecha)}" onchange="updateSubItem('${l.id}','experiencias',${i},'fecha',this.value)" style="border:none;background:transparent;color:var(--text-3);font-family:Inter,sans-serif;">
      <textarea class="si-body autogrow" placeholder="Qué viste, qué funcionó, qué no…" oninput="autoGrow(this);updateSubItem('${l.id}','experiencias',${i},'texto',this.value)">${esc(ex.texto)}</textarea>

  return `

        ${editMode?`<div>${evalHtml}</div><button class="btn-add-sub" onclick="addSubItem('${l.id}','evaluacion',{nombre:'',detalle:''})">+ Agregar test</button>`:`<ul class="ref-list">${evalHtml}</ul>`}
      </div>
      <div class="ref-block">

        ${evolHtml}

      </div>
      <div class="ref-block full-only">
        <div class="sub-section-title">🗂 Manejo y protocolos</div>
        ${editMode?`<div>${protoHtml}</div><button class="btn-add-sub" onclick="addSubItem('${l.id}','protocolos',{nombre:'',contenido:''})">+ Agregar protocolo</button>`:`<ul class="ref-list">${protoHtml}</ul>`}
      </div>
      <hr class="notes-divider full-only">
      <div class="ref-block full-only">
        <div class="sub-section-title">📝 Mis experiencias</div>
        ${expHtml}
        <button class="btn-add-sub" onclick="addSubItem('${l.id}','experiencias',{fecha:new Date().toISOString().slice(0,10),texto:''})">+ Agregar experiencia</button>
      </div>
      <div class="ref-block full-only">
        <div class="sub-section-title">📄 Papers / referencias</div>
        ${papersHtml}
        <button class="btn-add-sub" onclick="addSubItem('${l.id}','papers',{titulo:'',autorAnio:'',link:'',resumen:''})">+ Agregar paper</button>
      </div>
    </div>
  </div>`;
}

function updateLesionField(id,field,val){
  const z=getZonaData(currentZona);
  const l=z.lesiones.find(x=>x.id===id); if(!l) return;
  l[field]=val;
  debSave();
}

function autoGrow(el){
  el.style.height='auto';
  el.style.height=(el.scrollHeight+2)+'px';
}
function autoGrowAll(){
  document.querySelectorAll('.autogrow, .ref-edit').forEach(autoGrow);
}

function toggleLesion(id){
  if(openLesionIds.has(id)) openLesionIds.delete(id); else openLesionIds.add(id);
  const el=document.getElementById('lc_'+id);
  if(el) el.classList.toggle('open', openLesionIds.has(id));
}

function addSubItem(lesionId,key,item){
  const z=getZonaData(currentZona);
  const l=z.lesiones.find(x=>x.id===lesionId); if(!l) return;
  if(!l[key]) l[key]=[];
  l[key].push(item);
  saveDB();
  renderZonaView();
}
function removeSubItem(lesionId,key,idx){
  const z=getZonaData(currentZona);
  const l=z.lesiones.find(x=>x.id===lesionId); if(!l||!l[key]) return;
  l[key].splice(idx,1);
  saveDB();
  renderZonaView();
}
function updateSubItem(lesionId,key,idx,field,val){
  const z=getZonaData(currentZona);
  const l=z.lesiones.find(x=>x.id===lesionId); if(!l||!l[key]||!l[key][idx]) return;
  l[key][idx][field]=val;
  debSave();
}

// ══════════════════ VISTA: BIBLIOTECA ══════════════════
// Carga inicial con papers de referencia en fisio/kinesio deportiva.
// Resúmenes y "cita clave" escritos en base a conocimiento general del tema,
// no son citas textuales — conviene chequear el artículo original antes de
// usar una cifra puntual en una decisión clínica. El link/DOI está confirmado
// por búsqueda solo en los primeros 6 (Grindem, Cook&Purdam, Lewis, O'Sullivan,
// Grimaldi, Vuurberg); el resto quedó sin link para que lo completes vos.
// Suma papers nuevos del seed que todavía no estén (por título) y le agrega
// categoría a los que ya existían sin ese campo. No pisa nada que ya hayas
// editado (estado, resumen, rating, etc.), corre cada vez que se abre la app.
function migrateBiblioteca(){
  const seed=seedDefaultBiblioteca().articulos;
  let changed=false;
  seed.forEach(seedArt=>{
    const existing=BIB.articulos.find(a=>a.titulo===seedArt.titulo);
    if(!existing){
      BIB.articulos.push(seedArt);
      changed=true;
    } else {
      if(!existing.categoria && seedArt.categoria){ existing.categoria=seedArt.categoria; changed=true; }
      if(!existing.nivel && seedArt.nivel){ existing.nivel=seedArt.nivel; changed=true; }
    }
  });
  if(changed) bibSaveDB();
}

function truncate(s,n){ s=s||''; return s.length>n ? s.slice(0,n).trim()+'…' : s; }

function zonaOptionsHtml(selected){
  return `<option value="">Zona clínica (opcional)</option>` +
    CLINICAL_ZONAS.map(z=>`<option value="${z.id}" ${z.id===selected?'selected':''}>${esc(z.label)}</option>`).join('');
}
function categoriaOptionsHtml(selected){
  return `<option value="">Tema (opcional)</option>` +
    CATEGORIAS.map(c=>`<option value="${c.id}" ${c.id===selected?'selected':''}>${esc(c.label)}</option>`).join('');
}
function nivelOptionsHtml(selected){
  return `<option value="">Nivel de evidencia (opcional)</option>` +
    NIVELES.map(n=>`<option value="${n.id}" ${n.id===selected?'selected':''}>${esc(n.label)}</option>`).join('');

function starsHtml(rating){
  rating=rating||0;
  let out='';
  for(let i=1;i<=5;i++) out += i<=rating ? '★' : '☆';
  return out;
}
function starsEditHtml(id,rating){
  rating=rating||0;
  let out='';
  for(let i=1;i<=5;i++){
    out += `<span class="${i<=rating?'filled':''}" onclick="event.stopPropagation();setArticuloRating('${id}',${i})">★</span>`;
  }
  return out;
}

function renderBibliotecaView(){
  document.getElementById('btnBack').style.display='none';
  document.getElementById('btnSwitch').style.display='inline-block';
  document.getElementById('btnSwitch').textContent='🩻 Atlas';
  document.getElementById('btnLock').style.display='none';

  const pendCount=BIB.articulos.filter(a=>a.estado==='pendiente').length;
  const leyendoCount=BIB.articulos.filter(a=>a.estado==='leyendo').length;
  const leidoCount=BIB.articulos.filter(a=>a.estado==='leido').length;
  const mesActual=new Date().toISOString().slice(0,7);
  const leidoMesCount=BIB.articulos.filter(a=>a.estado==='leido' && a.fechaLeido && a.fechaLeido.slice(0,7)===mesActual).length;

  document.getElementById('topTitle').textContent='Biblioteca';
  document.getElementById('topSub').textContent=`${pendCount} pendientes · ${leyendoCount} leyendo · ${leidoMesCount} leídos este mes`;

  const q=(document.getElementById('bibSearchInput')?document.getElementById('bibSearchInput').value:'').toLowerCase();

  let list=BIB.articulos.slice();
  if(bibFilter!=='todos') list=list.filter(a=>a.estado===bibFilter);
  if(bibZonaFilter) list=list.filter(a=>a.zona===bibZonaFilter);
  if(bibCategoriaFilter) list=list.filter(a=>a.categoria===bibCategoriaFilter);
  if(bibNivelFilter) list=list.filter(a=>a.nivel===bibNivelFilter);
  if(q) list=list.filter(a=>
    (a.titulo||'').toLowerCase().includes(q) ||
    (a.autorAnio||'').toLowerCase().includes(q) ||
    (a.tags||'').toLowerCase().includes(q) ||
    (a.resumen||'').toLowerCase().includes(q)
  );
  list.sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));

  const zonasPresentes=[...new Set(BIB.articulos.map(a=>a.zona).filter(Boolean))];
  const zonaChipsHtml = zonasPresentes.length ? `
    <div class="bib-zona-filter">
      <span class="filter-label">Zona:</span>
      <span class="zona-chip ${bibZonaFilter===''?'on':''}" onclick="setBibZonaFilter('')">Todas</span>
      ${zonasPresentes.map(zid=>`<span class="zona-chip ${bibZonaFilter===zid?'on':''}" onclick="setBibZonaFilter('${zid}')">${esc(ZONA_LABELS[zid]||zid)}</span>`).join('')}
    </div>` : '';

  const categoriasPresentes=[...new Set(BIB.articulos.map(a=>a.categoria).filter(Boolean))];
  const categoriaChipsHtml = categoriasPresentes.length ? `
    <div class="bib-zona-filter">
      <span class="filter-label">Tema:</span>
      <span class="zona-chip ${bibCategoriaFilter===''?'on':''}" onclick="setBibCategoriaFilter('')">Todos</span>
      ${categoriasPresentes.map(cid=>`<span class="zona-chip ${bibCategoriaFilter===cid?'on':''}" onclick="setBibCategoriaFilter('${cid}')">${esc(CATEGORIA_LABELS[cid]||cid)}</span>`).join('')}
    </div>` : '';

  const nivelesPresentes=[...new Set(BIB.articulos.map(a=>a.nivel).filter(Boolean))];
  const nivelChipsHtml = nivelesPresentes.length ? `
    <div class="bib-zona-filter">
      <span class="filter-label">Nivel:</span>
      <span class="zona-chip ${bibNivelFilter===''?'on':''}" onclick="setBibNivelFilter('')">Todos</span>
      ${nivelesPresentes.map(nid=>`<span class="zona-chip ${bibNivelFilter===nid?'on':''}" onclick="setBibNivelFilter('${nid}')">${esc(NIVEL_LABELS[nid]||nid)}</span>`).join('')}
    </div>` : '';

  const cardsHtml = list.length ? list.map(a=>buildArticuloCard(a)).join('') :
    `<div class="bib-empty">${BIB.articulos.length?'No hay artículos que matcheen el filtro.':'Todavía no cargaste artículos. Tocá "+ Agregar artículo" para empezar.'}</div>`;

  document.getElementById('panel').innerHTML=`
    <div class="bib-dash">
      <div class="bib-stat"><span class="bib-stat-num">${pendCount}</span><span class="bib-stat-label">Pendientes</span></div>
      <div class="bib-stat"><span class="bib-stat-num">${leyendoCount}</span><span class="bib-stat-label">Leyendo</span></div>
      <div class="bib-stat"><span class="bib-stat-num">${leidoMesCount}</span><span class="bib-stat-label">Leídos/mes</span></div>
    </div>
    <input class="bib-search" id="bibSearchInput" placeholder="Buscar por título, autor, tag…" value="${esc(q)}" oninput="renderBibliotecaView()">
    <div class="bib-tabs">
      <button class="${bibFilter==='pendiente'?'on':''}" onclick="setBibFilter('pendiente')">Pendiente <span class="tab-count">${pendCount}</span></button>
      <button class="${bibFilter==='leyendo'?'on':''}" onclick="setBibFilter('leyendo')">Leyendo <span class="tab-count">${leyendoCount}</span></button>
      <button class="${bibFilter==='leido'?'on':''}" onclick="setBibFilter('leido')">Leído <span class="tab-count">${leidoCount}</span></button>
      <button class="${bibFilter==='todos'?'on':''}" onclick="setBibFilter('todos')">Todos</button>
    </div>
    ${zonaChipsHtml}
    ${categoriaChipsHtml}
    ${nivelChipsHtml}
    <div class="bib-list">${cardsHtml}</div>
    <button class="btn-add-article" onclick="addArticulo()">+ Agregar artículo</button>
  `;
  autoGrowAll();
}

function setBibFilter(f){ bibFilter=f; renderBibliotecaView(); }
function setBibZonaFilter(zid){ bibZonaFilter=zid; renderBibliotecaView(); }
function setBibCategoriaFilter(cid){ bibCategoriaFilter=cid; renderBibliotecaView(); }
function setBibNivelFilter(nid){ bibNivelFilter=nid; renderBibliotecaView(); }

function buildArticuloCard(a){
  const open=openArticleIds.has(a.id);
  return `
  <div class="art-card ${open?'open':''}" id="art_${a.id}">
    <div class="art-head" onclick="toggleArticulo('${a.id}')">
      <span class="art-estado-dot estado-${a.estado||'pendiente'}"></span>
      <div class="art-title-block">
        <h3>${esc(a.titulo)||'Sin título'}</h3>
        <p class="art-meta">${esc(a.autorAnio)}</p>
      </div>
      <div class="art-rating">${starsHtml(a.rating)}</div>
      <span class="art-chevron">▾</span>
    </div>
    ${a.resumen?`<div class="art-preview">${esc(truncate(a.resumen,120))}</div>`:''}
    <div class="art-body">
      <div class="art-row-estado">
        <button class="estado-btn ${a.estado==='pendiente'?'on pend':''}" onclick="setArticuloEstado('${a.id}','pendiente')">Pendiente</button>
        <button class="estado-btn ${a.estado==='leyendo'?'on leyendo':''}" onclick="setArticuloEstado('${a.id}','leyendo')">Leyendo</button>
        <button class="estado-btn ${a.estado==='leido'?'on leido':''}" onclick="setArticuloEstado('${a.id}','leido')">Leído</button>
      </div>
      <input class="art-input title" value="${esc(a.titulo)}" placeholder="Título del artículo" oninput="updateArticulo('${a.id}','titulo',this.value)">
      <input class="art-input" value="${esc(a.autorAnio)}" placeholder="Autor, año" oninput="updateArticulo('${a.id}','autorAnio',this.value)">
      <input class="art-input" value="${esc(a.link)}" placeholder="Link (DOI, PubMed, PDF…)" oninput="updateArticulo('${a.id}','link',this.value)">
      <div class="art-row-select">
        <select class="art-select" onchange="updateArticulo('${a.id}','zona',this.value)">${zonaOptionsHtml(a.zona)}</select>
        <select class="art-select" onchange="updateArticulo('${a.id}','categoria',this.value)">${categoriaOptionsHtml(a.categoria)}</select>
      </div>
      <div class="art-row-select">
        <select class="art-select" onchange="updateArticulo('${a.id}','nivel',this.value)">${nivelOptionsHtml(a.nivel)}</select>
        <div class="art-stars-edit">${starsEditHtml(a.id,a.rating)}</div>
      </div>
      <input class="art-input" value="${esc(a.tags)}" placeholder="Tags (separados por coma)" oninput="updateArticulo('${a.id}','tags',this.value)">
      <label class="art-label">Resumen / conclusión clave</label>
      <textarea class="art-textarea autogrow" placeholder="De qué trata, qué encontraron, por qué importa…" oninput="autoGrow(this);updateArticulo('${a.id}','resumen',this.value)">${esc(a.resumen)}</textarea>
      <label class="art-label">Cita / dato clave</label>
      <textarea class="art-textarea autogrow" placeholder="Un dato o cifra para recordar…" oninput="autoGrow(this);updateArticulo('${a.id}','citaClave',this.value)">${esc(a.citaClave)}</textarea>
      <button class="btn-del-article" onclick="deleteArticulo('${a.id}')">Eliminar artículo</button>
    </div>
  </div>`;
}

function toggleArticulo(id){
  if(openArticleIds.has(id)) openArticleIds.delete(id); else openArticleIds.add(id);
  const el=document.getElementById('art_'+id);
  if(el) el.classList.toggle('open', openArticleIds.has(id));
}

function addArticulo(){
  const a={
    id: uid(), titulo:'', autorAnio:'', link:'', estado:'pendiente',
    zona:'', categoria:'', nivel:'', tags:'', rating:0, resumen:'', citaClave:'',
    fecha:new Date().toISOString().slice(0,10), fechaLeido:''
  };
  BIB.articulos.unshift(a);
  openArticleIds.add(a.id);
  bibFilter='pendiente';
  bibSaveDB();
  renderBibliotecaView();
}

function deleteArticulo(id){
  if(!confirm('¿Eliminar este artículo? No se puede deshacer.')) return;
  BIB.articulos=BIB.articulos.filter(a=>a.id!==id);
  bibSaveDB();
  renderBibliotecaView();
}

function updateArticulo(id,field,val){
  const a=BIB.articulos.find(x=>x.id===id); if(!a) return;
  a[field]=val;
  debBibSave();
}

function setArticuloEstado(id,estado){
  const a=BIB.articulos.find(x=>x.id===id); if(!a) return;
  a.estado=estado;
  if(estado==='leido' && !a.fechaLeido) a.fechaLeido=new Date().toISOString().slice(0,10);
  bibSaveDB();
  renderBibliotecaView();
}

function setArticuloRating(id,rating){
  const a=BIB.articulos.find(x=>x.id===id); if(!a) return;
  a.rating = (a.rating===rating) ? 0 : rating; // tocar la misma estrella la desmarca
  bibSaveDB();
  renderBibliotecaView();
}
</script>
</body>
</html>
